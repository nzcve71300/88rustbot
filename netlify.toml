[build]
  base = "88-command-center"
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

# SPA routing (react-router) — serve index.html for all paths
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"

# Reduce stale shell: hashed assets can cache forever; HTML + manifest should revalidate.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
