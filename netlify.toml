[build]
  base = "88-command-center"
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

# SPA routing (react-router) — serve index.html for all paths
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"
